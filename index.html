<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>平板 POS</title>
  <style>
    :root {
      --bg: #f2f4f7;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #f97316;
      --line: #e5e7eb;
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    button {
      min-height: 50px;
      user-select: none;
      -webkit-user-select: none;
    }

    button::-moz-focus-inner {
      border: 0;
      padding: 0;
    }

    html,
    body {
      height: 100% !important;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, -apple-system, sans-serif;
      background-color: #0f172a;
      background-image:
        linear-gradient(rgba(15, 23, 42, 0.42), rgba(15, 23, 42, 0.42)),
        url("https://images.unsplash.com/photo-1547592180-85f173990554?auto=format&fit=crop&w=1920&q=80");
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #posWorkspace {
      flex: 1;
      height: 100vh !important;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .app {
      padding: 12px;
      flex: 1;
      height: 100% !important;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: hidden;
      padding-bottom: 20px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      background: transparent;
    }

    .brand-title {
      font-size: 28px;
      font-weight: 800;
      color: #1e3a8a;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .report-btn {
      border: none;
      background: #111827;
      color: #fff;
      font-size: 18px;
      font-weight: 700;
      border-radius: 12px;
      padding: 14px 18px;
      min-height: 54px;
      cursor: pointer;
    }

    .tool-btn {
      border: 1px solid rgba(255, 255, 255, 0.7);
      background: rgba(255, 255, 255, 0.72);
      color: #1f2937;
      font-size: 14px;
      font-weight: 700;
      border-radius: 10px;
      padding: 8px 10px;
      min-height: 44px;
      cursor: pointer;
    }

    .floating-admin-actions {
      position: fixed;
      left: 18px;
      bottom: 10px;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      max-width: calc(100vw - 32px);
      background: transparent;
    }

    .inventory-btn,
    .monthly-ranking-btn {
      appearance: none;
      -webkit-appearance: none;
      border: 0 !important;
      outline: none;
      box-shadow: none;
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      border-radius: 999px;
      padding: 12px 16px;
      min-height: 50px;
      cursor: pointer;
      background-clip: padding-box;
    }

    .inventory-btn {
      background: #0f766e !important;
    }

    .monthly-ranking-btn {
      background: #2563eb !important;
    }

    .layout {
      flex: 1;
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 350px;
      gap: 16px;
      overflow: hidden;
    }

    .layout > .panel:first-child {
      min-width: 0;
      min-height: 0;
      height: 100%;
      max-height: 100%;
    }

    .layout > .panel:last-child {
      width: 350px;
      max-width: 350px;
      min-width: 350px;
      height: 100%;
      justify-self: end;
    }

    .app-logout-footer {
      position: fixed;
      left: 50%;
      bottom: 10px;
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: center;
      transform: translateX(-50%);
    }

    .btn-logout {
      border: 1px solid rgba(220, 38, 38, 0.42);
      background: rgba(255, 255, 255, 0.9);
      color: #b91c1c;
      font-size: 15px;
      font-weight: 700;
      border-radius: 12px;
      padding: 12px 28px;
      min-height: 48px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .btn-logout:active {
      transform: scale(0.99);
    }

    .checkout-panel {
      background-color: rgba(255, 255, 255, 0.95);
      border-radius: 15px;
      padding: 12px 20px 20px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(226, 232, 240, 0.9);
      min-height: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: static;
      top: auto;
      align-self: stretch;
    }

    .checkout-panel h2 {
      color: #2e8b57;
      font-weight: 800;
      display: block;
      text-align: center;
      text-shadow: 0 0 6px rgba(57, 255, 20, 0.45);
    }

    .menu-panel h2 {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.62);
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
    }

    .menu-panel {
      flex: 1 1 0;
      min-height: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel {
      background-color: transparent;
      border-radius: 18px;
      padding: 16px;
      border: none;
      box-shadow: none;
      min-height: 0;
      display: flex;
      flex-direction: column;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 22px;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      flex: 1;
      min-height: 0;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      touch-action: pan-y;
      padding-right: 4px;
      padding-bottom: 100px;
    }

    .menu-item {
      border: 1px solid rgba(255, 255, 255, 0.6);
      background-color: rgba(255, 255, 255, 0.55);
      border-radius: 12px;
      padding: 8px 10px;
      min-height: 80px;
      text-align: left;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: transform 0.05s ease, box-shadow 0.15s ease;
      touch-action: pan-y;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.12);
    }

    .menu-item:hover {
      background-color: rgba(255, 255, 255, 0.7);
    }

    .menu-item:active {
      transform: scale(0.98);
    }

    .menu-item strong {
      display: block;
      font-size: 16px;
      margin-bottom: 4px;
      line-height: 1.25;
      color: #212529;
      text-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
      word-break: break-word;
    }

    .menu-item span {
      font-size: 15px;
      color: #212529;
      line-height: 1.2;
      text-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
    }

    .menu-item.discount {
      border: 1px solid rgba(255, 255, 255, 0.6);
      background-color: rgba(40, 167, 69, 0.65);
      color: #fff;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .menu-item.discount span {
      color: rgba(255, 255, 255, 0.9);
    }

    .cart-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      touch-action: pan-y;
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 12px;
      padding: 10px;
      background-color: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.06);
      max-height: none;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 24px 8px;
      font-size: 18px;
    }

    .cart-item {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #eceff3;
      padding: 10px 4px;
    }

    .cart-item:last-child {
      border-bottom: none;
    }

    .item-name {
      font-size: 18px;
      line-height: 1.3;
      color: #111827;
    }

    .item-price {
      font-size: 18px;
      font-weight: 700;
      white-space: nowrap;
      color: #111827;
    }

    .delete-btn {
      border: none;
      background: #fee2e2;
      color: #991b1b;
      font-size: 16px;
      font-weight: 700;
      border-radius: 10px;
      padding: 8px 10px;
      cursor: pointer;
      min-width: 58px;
      min-height: 42px;
    }

    .total {
      margin: 14px 0;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      font-size: 24px;
      font-weight: 800;
      color: #111827;
      text-align: right;
    }

    @supports (-webkit-touch-callout: none) {
      body {
        background-attachment: scroll;
      }
    }

    .order-meta {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin: 0 0 14px;
    }

    .order-meta-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .order-meta-field label {
      display: block;
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      color: #2e8b57;
      text-shadow: 0 0 6px rgba(57, 255, 20, 0.45);
      margin-bottom: 6px;
    }

    .order-meta-input {
      width: 100%;
      min-height: 56px;
      border: 2px solid #cbd5e1;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 24px;
      font-weight: 700;
      color: #0f172a;
      background: #fff;
    }

    .order-meta-input::placeholder {
      font-size: 19px;
      font-weight: 600;
    }

    .order-meta-input:focus {
      outline: 3px solid rgba(37, 99, 235, 0.2);
      border-color: #2563eb;
    }

    .pickup-time-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center;
      gap: 8px;
    }

    .pickup-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: flex-start;
      font-size: 22px;
      font-weight: 800;
      color: #0f172a;
      padding: 4px 2px;
    }

    .pickup-toggle input {
      width: 24px;
      height: 24px;
      accent-color: #16a34a;
    }

    .pickup-time-field.is-hidden {
      display: none;
    }

    .pickup-time-separator {
      font-size: 28px;
      font-weight: 900;
      color: #0f172a;
      line-height: 1;
      text-align: center;
      user-select: none;
    }

    .actions {
      display: flex;
      gap: 12px;
    }

    .checkout-actions {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      width: 100%;
      margin-top: auto;
      padding-top: 10px;
    }

    .print-ready-panel {
      margin-top: 10px;
      display: none;
    }

    .print-ready-panel.show {
      display: block;
    }

    .print-ready-link {
      display: block;
      width: 100%;
      min-height: 62px;
      line-height: 62px;
      border-radius: 12px;
      text-align: center;
      text-decoration: none;
      font-size: 24px;
      font-weight: 900;
      color: #fff;
      background: #16a34a;
      border: 2px solid #15803d;
    }

    .actions .btn {
      flex: 1;
    }

    .actions .btn-print {
      flex: 2;
    }

    .btn {
      border: none;
      border-radius: 12px;
      min-height: 58px;
      font-size: 20px;
      font-weight: 800;
      color: #fff;
      cursor: pointer;
      touch-action: manipulation;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-clear {
      background: var(--danger);
    }

    .btn-checkout {
      background: var(--primary);
    }

    .btn-print {
      background: var(--success);
    }

    .receipt-print {
      display: none;
      width: 80mm;
      margin: 0 auto;
      padding: 5mm 4mm 0;
      background: #fff;
      color: #000;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      font-size: 14pt;
      line-height: 1.35;
    }

    .receipt-brand {
      margin: 0;
      text-align: center;
      font-size: 16pt;
      font-weight: 900;
      letter-spacing: 0.3px;
    }

    .receipt-meta {
      margin-top: 2mm;
    }

    .receipt-meta-line {
      margin: 0;
      text-align: left;
      font-size: 14pt;
      font-weight: 700;
    }

    .receipt-divider {
      border-top: 1px dashed #000;
      margin: 3mm 0;
    }

    .receipt-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .receipt-table th,
    .receipt-table td {
      padding: 1.5mm 0;
      font-size: 14pt;
      font-weight: 600;
    }

    .receipt-table th:nth-child(1),
    .receipt-table td:nth-child(1) {
      text-align: left;
      width: 52%;
      word-break: break-word;
      padding-right: 2mm;
    }

    .receipt-table th:nth-child(2),
    .receipt-table td:nth-child(2),
    .receipt-table th:nth-child(3),
    .receipt-table td:nth-child(3) {
      text-align: right;
      white-space: nowrap;
      width: 24%;
    }

    .receipt-total {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 16pt;
      font-weight: 900;
      margin: 2mm 0 0;
    }

    .receipt-thanks {
      text-align: center;
      font-size: 14pt;
      font-weight: 700;
      margin: 2mm 0 0;
      padding-bottom: 0;
    }

    .watermark-badge {
      position: fixed;
      bottom: 30px;
      right: 20px;
      z-index: 9999;
      padding: 6px 14px;
      border-radius: 50px;
      background-color: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      font-size: 14px;
      font-weight: 700;
      color: #1e293b;
      user-select: none;
      pointer-events: none;
    }

    body.modal-open {
      overflow: hidden !important;
    }

    html.modal-open {
      overflow: hidden !important;
    }

    /* Modal */
    .modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 9999;
      pointer-events: auto;
    }

    .modal::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 9990;
      pointer-events: auto;
    }

    .modal.show {
      display: flex;
    }

    .modal-card {
      position: relative;
      z-index: 10000;
      pointer-events: auto !important;
      width: min(900px, 100%);
      max-height: 90vh;
      overflow: auto;
      background: #fff;
      border-radius: 16px;
      padding: 18px;
    }

    .modal .btn:active {
      transform: scale(0.97);
      filter: brightness(0.94);
    }

    .report-total {
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 12px;
      padding: 14px;
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .report-list {
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
    }

    .report-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 14px;
      border-bottom: 1px solid #edf0f4;
      font-size: 18px;
    }

    .report-row:last-child {
      border-bottom: none;
    }

    .ranking-title {
      margin: 8px 0 10px;
      font-size: 20px;
      color: #0f172a;
    }

    .sales-rank-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 12px 14px;
      border-bottom: 1px solid #edf0f4;
    }

    .sales-rank-row:last-child {
      border-bottom: none;
    }

    .sales-rank-main {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .sales-rank-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 17px;
      color: #0f172a;
      font-weight: 700;
    }

    .sales-rank-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sales-rank-bar {
      height: 12px;
      border-radius: 999px;
      background: #e2e8f0;
      overflow: hidden;
    }

    .sales-rank-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #2563eb, #0ea5e9);
    }

    .modal-actions {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .btn-close {
      background: #334155;
    }

    .btn-reset {
      background: var(--warning);
    }

    .reset-tip {
      margin-top: 8px;
      font-size: 13px;
      color: #94a3b8;
      text-align: center;
    }

    .btn-reset-month {
      background: var(--danger);
    }

    /* Daily report modal: compact card layout */
    #reportModal .modal-card,
    #monthlyReportModal .modal-card {
      width: min(80vw, 920px);
      max-width: 920px;
      padding: 20px 18px 18px;
    }

    #reportModal h2 {
      text-align: center;
      margin-bottom: 12px;
    }

    #reportModal .report-total {
      text-align: center;
      padding: 18px 14px;
      margin-bottom: 14px;
    }

    #reportModal .modal-actions {
      max-width: 380px;
      margin: 0 auto;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    #reportModal .modal-actions .btn {
      min-height: 52px;
      font-size: 18px;
    }

    #reportModal .reset-tip {
      margin-top: 10px;
      text-align: center;
    }

    .btn-void {
      background: var(--danger);
      min-height: 44px;
      font-size: 16px;
      padding: 8px 12px;
      border-radius: 10px;
    }

    .btn-detail {
      background: #0f766e;
      min-height: 44px;
      font-size: 16px;
      padding: 8px 12px;
      border-radius: 10px;
    }

    .btn-item-remove {
      background: #b91c1c;
      min-height: 34px;
      font-size: 13px;
      padding: 6px 8px;
      border-radius: 8px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 62vh;
      overflow: auto;
    }

    .history-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 10px 0 12px;
    }

    .history-tab {
      border: 1px solid #cbd5e1;
      background: #e5e7eb;
      color: #334155;
      border-radius: 10px;
      min-height: 44px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .history-tab.active {
      background: #2563eb;
      color: #fff;
      border-color: #1d4ed8;
      box-shadow: inset 0 -3px 0 rgba(255, 255, 255, 0.25);
    }

    .history-item {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      background: #fff;
    }

    .history-item.voided {
      background: #f3f4f6;
      border-color: #d1d5db;
    }

    .history-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .history-main {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      align-items: center;
      font-size: 16px;
    }

    .void-tag {
      color: #6b7280;
      background: #e5e7eb;
      border-radius: 999px;
      padding: 4px 10px;
      font-weight: 800;
    }

    .voided-text {
      text-decoration: line-through;
      color: #6b7280;
    }

    .history-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .history-detail {
      margin-top: 10px;
      border-top: 1px dashed #d1d5db;
      padding-top: 8px;
      display: none;
    }

    .history-detail.show {
      display: block;
    }

    .history-detail-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 15px;
    }

    .inventory-modal-card {
      width: min(1180px, 100%);
      height: min(92vh, 100%);

      align-items: center;
      gap: 12px;
      flex-wrap: wrap;

      display: grid;
      grid-template-columns: 1.4fr 1fr 1fr auto;
      gap: 10px;
    }

      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 10px;

      padding: 10px 12px;

      font-weight: 600;

      flex: 1;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;

    .inventory-row {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(90px, 0.7fr) minmax(110px, 0.8fr) minmax(120px, 0.9fr) auto;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;

      font-size: 18px;

      position: sticky;
      top: 0;
      background: #f8fafc;
      font-weight: 800;
      z-index: 1;

    .inventory-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

      min-height: 44px;
      border-radius: 10px;
      font-size: 16px;
      padding: 8px 12px;
    }

      background: #16a34a;
    }

    .btn-stock-minus {
      background: #dc2626;
    }

      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 12px;
      padding: 14px;
      font-size: 24px;
      font-weight: 800;
      text-align: right;

      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;

    function normalizeInventoryItem(item) {
      if (!item || typeof item !== "object") return null;
      const name = typeof item.name === "string" ? item.name.trim() : "";
      const unit = typeof item.unit === "string" ? item.unit.trim() : "";
      const cost = Number(item.cost);
      const stock = Number(item.stock);
      if (!name || !unit || !Number.isFinite(cost) || cost < 0 || !Number.isFinite(stock)) return null;
      return {
        id: typeof item.id === "string" && item.id ? item.id : "inv_" + Date.now() + "_" + Math.random().toString(16).slice(2),
        name,
        unit,
        cost,
        stock: Math.max(0, stock)
      };
    }

    function loadInventory() {
      const raw = localStorage.getItem(INVENTORY_STORAGE_KEY);
      if (!raw) return [];
      try {
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        return parsed.map((item) => normalizeInventoryItem(item)).filter((item) => item !== null);
      } catch (error) {
        return [];
      }
    }

      localStorage.setItem(INVENTORY_STORAGE_KEY, JSON.stringify(data));
    }

    function getInventoryTotalValue() {
      return inventoryData.reduce((sum, item) => sum + item.cost * item.stock, 0);
    }

    function renderInventoryList() {

      const header = document.createElement("div");
      header.className = "inventory-row header";
      header.innerHTML =
        "<div>食材名稱</div>" +
        "<div>單位</div>" +
        "<div>單位成本</div>" +
        "<div>目前庫存</div>" +
        "<div>操作</div>";

      } else {

          const row = document.createElement("div");

            item.name +
            "</strong></div>" +
            "<div>" +
            item.unit +
            "</div>" +
            "<div>" +
            formatMoney(item.cost) +
            "</div>" +
            "<div>" +
            item.stock +
            " " +
            item.unit +
            "</div>" +
            '<div class="inventory-actions">' +
            '<button class="btn btn-stock-plus" data-action="plus" data-id="' +
            item.id +
            '">+ 進貨</button>' +

    function addInventoryItem() {
      const name = inventoryNameInput.value.trim();
      const unit = inventoryUnitInput.value.trim();
      const cost = Number(inventoryCostInput.value);
      if (!name || !unit) {
        alert("請輸入完整的食材名稱與單位。");
        return;
      }
      if (!Number.isFinite(cost) || cost < 0) {
        alert("請輸入有效的單位成本。");
        return;
      }

      inventoryData.push({
        id: "inv_" + Date.now() + "_" + Math.random().toString(16).slice(2),
        name,
        unit,
        cost,
        stock: 0
      });
      saveInventory(inventoryData);
      renderInventoryList();
      inventoryNameInput.value = "";
      inventoryUnitInput.value = "";
      inventoryCostInput.value = "";
      inventoryNameInput.focus();
    }

    function adjustInventoryStock(itemId, isIncrease) {
      const target = inventoryData.find((item) => item.id === itemId);
      if (!target) return;

      const verb = isIncrease ? "進貨" : "減少";
      const input = prompt("請輸入「" + target.name + "」要" + verb + "的數量（單位：" + target.unit + "）：", "1");
      if (input === null) return;
      const amount = Number(input);
      if (!Number.isFinite(amount) || amount <= 0) {
        alert("請輸入大於 0 的有效數量。");
        return;
      }

      if (isIncrease) {
        target.stock += amount;
      } else {
        target.stock = Math.max(0, target.stock - amount);
      }
      saveInventory(inventoryData);
      renderInventoryList();
    }

    function openInventoryModal() {
      inventoryData = loadInventory();
      renderInventoryList();
      inventoryModal.classList.add("show");
      inventoryModal.setAttribute("aria-hidden", "false");
      syncModalLockState();
      inventoryNameInput.focus();
    }

    function closeInventoryModal() {
      inventoryModal.classList.remove("show");
      inventoryModal.setAttribute("aria-hidden", "true");
      syncModalLockState();
    }

    function createInitialReport() {
      const itemCounts = {};
      MENU_ITEMS.forEach((item) => {
        itemCounts[item.id] = 0;
      });
      return { totalRevenue: 0, itemCounts };
    }

    function getMonthKey(dateObj) {
      const year = dateObj.getFullYear();
      const month = String(dateObj.getMonth() + 1).padStart(2, "0");
      return year + "-" + month;
    }

    function getTodayKey(dateObj) {
      const target = dateObj || new Date();
      const year = target.getFullYear();
      const month = String(target.getMonth() + 1).padStart(2, "0");
      const day = String(target.getDate()).padStart(2, "0");
      return year + "-" + month + "-" + day;
    }

    function buildItemCounts(items) {
      const counts = {};
      MENU_ITEMS.forEach((item) => {
        counts[item.id] = 0;
      });
      items.forEach((item) => {
        if (!Object.prototype.hasOwnProperty.call(counts, item.id)) {
          counts[item.id] = 0;
        }
        counts[item.id] += 1;
      });
      return counts;
    }

    function safeNormalizeOrder(order) {
      if (!order || typeof order !== "object") return null;
      if (typeof order.date !== "string" || typeof order.month !== "string") return null;
      const total = Number(order.total);
      if (!Number.isFinite(total)) return null;
      if (!order.itemCounts || typeof order.itemCounts !== "object") return null;

      const safeCounts = {};
      MENU_ITEMS.forEach((item) => {
        const value = Number(order.itemCounts[item.id]);
        safeCounts[item.id] = Number.isFinite(value) ? Math.max(0, Math.floor(value)) : 0;
      });

      return {
        date: order.date,
        month: order.month,
        total,
        itemCounts: safeCounts,
        timestamp: typeof order.timestamp === "string" ? order.timestamp : new Date().toISOString(),
        orderNo: Number.isFinite(Number(order.orderNo)) ? Math.floor(Number(order.orderNo)) : 0,
        status: order.status === "voided" ? "voided" : "active",
        lineItems: Array.isArray(order.lineItems) ? order.lineItems : [],
        is_daily_cleared: order.is_daily_cleared === true,
        table_number: typeof order.table_number === "string" && order.table_number.trim()
          ? order.table_number.trim()
          : DEFAULT_TABLE_NUMBER,
        pickup_time: typeof order.pickup_time === "string" && order.pickup_time.trim()
          ? order.pickup_time.trim()
          : ""
      };
    }

    function firestoreTimestampToIso(value) {
      if (value && typeof value.toDate === "function") {
        return value.toDate().toISOString();
      }
      if (typeof value === "string") return value;
      return new Date().toISOString();
    }

    function orderFromFirestoreDoc(docSnap) {
      const data = docSnap.data();
      if (!data || typeof data !== "object") return null;
      const normalized = safeNormalizeOrder({
        ...data,
        timestamp: firestoreTimestampToIso(data.timestamp)
      });
      if (!normalized) return null;
      return { ...normalized, id: docSnap.id };
    }

    async function fetchOrdersByDate(todayKey) {
      const q = query(collection(db, ORDERS_COLLECTION), where("date", "==", todayKey));
      const snap = await getDocs(q);
      const list = [];
      snap.forEach((docSnap) => {
        const o = orderFromFirestoreDoc(docSnap);
        if (o) list.push(o);
      });
      return list;
    }

    async function fetchOrdersByMonth(monthKey) {
      const q = query(collection(db, ORDERS_COLLECTION), where("month", "==", monthKey));
      const snap = await getDocs(q);
      const list = [];
      snap.forEach((docSnap) => {
        const o = orderFromFirestoreDoc(docSnap);
        if (o) list.push(o);
      });
      return list;
    }

    async function persistNewOrderToFirestore(orderItems, checkoutTime, orderNo, tableNumber, pickupTime) {
      const date = getTodayKey(checkoutTime);
      const month = getMonthKey(checkoutTime);
      const orderTotal = orderItems.reduce((sum, item) => sum + item.price, 0);
      const itemCounts = buildItemCounts(orderItems);
      const safePickupTime = typeof pickupTime === "string" && pickupTime.trim() ? pickupTime.trim() : "現場";
      await addDoc(collection(db, ORDERS_COLLECTION), {
        date,
        month,
        total: orderTotal,
        itemCounts,
        timestamp: Timestamp.fromDate(checkoutTime),
        orderNo,
        table_number: tableNumber,
        pickup_time: safePickupTime,
        status: "active",
        lineItems: orderItems.map((item) => ({ id: item.id, name: item.name, price: item.price })),
        is_daily_cleared: false
      });
    }

    function createSummaryFromOrders(orders) {
      const summary = createInitialReport();
      orders.forEach((order) => {
        if (order.status === "voided") return;
        summary.totalRevenue += order.total;
        MENU_ITEMS.forEach((item) => {
          summary.itemCounts[item.id] += order.itemCounts[item.id] || 0;
        });
      });
      return summary;
    }

    function formatOrderNumber(number) {
      return String(number).padStart(3, "0");
    }

    function getCounterState() {
      const today = getTodayKey();
      const fallback = { date: today, nextNumber: 1 };
      const raw = localStorage.getItem(ORDER_COUNTER_KEY);
      if (!raw) return fallback;

      try {
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") return fallback;
        if (parsed.date !== today) return fallback;
        const safeNext = Number.isFinite(parsed.nextNumber) && parsed.nextNumber > 0 ? Math.floor(parsed.nextNumber) : 1;
        return { date: today, nextNumber: safeNext };
      } catch (error) {
        return fallback;
      }
    }

    function saveCounterState(state) {
      localStorage.setItem(ORDER_COUNTER_KEY, JSON.stringify(state));
    }

    function issueOrderNumber() {
      const state = getCounterState();
      const current = state.nextNumber;
      saveCounterState({ date: state.date, nextNumber: current + 1 });
      return current;
    }

    function resetTodayOrderCounter() {
      saveCounterState({ date: getTodayKey(), nextNumber: 1 });
    }

    function formatDateTime(dateObj) {
      const year = dateObj.getFullYear();
      const month = String(dateObj.getMonth() + 1).padStart(2, "0");
      const day = String(dateObj.getDate()).padStart(2, "0");
      const hours = String(dateObj.getHours()).padStart(2, "0");
      const minutes = String(dateObj.getMinutes()).padStart(2, "0");
      const seconds = String(dateObj.getSeconds()).padStart(2, "0");
      return year + "/" + month + "/" + day + " " + hours + ":" + minutes + ":" + seconds;
    }

    function formatTwoDigits(value) {
      return String(value).padStart(2, "0");
    }

    function getCurrentTimeValue() {
      const now = new Date();
      const currentMinutes = now.getHours() * 60 + now.getMinutes();
      const roundedMinutes = Math.ceil(currentMinutes / 5) * 5;
      const safeMinutes = Math.min(roundedMinutes, 23 * 60 + 55);
      const hours = formatTwoDigits(Math.floor(safeMinutes / 60));
      const minutes = formatTwoDigits(safeMinutes % 60);
      return hours + ":" + minutes;
    }

    function buildPickupTimeSelectOptions() {
      if (!pickupHourSelect || !pickupMinuteSelect) return;
      pickupHourSelect.innerHTML = "";
      pickupMinuteSelect.innerHTML = "";

      for (let hour = 0; hour <= 23; hour += 1) {
        const value = formatTwoDigits(hour);
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        pickupHourSelect.appendChild(option);
      }

      for (let minute = 0; minute <= 55; minute += 5) {
        const value = formatTwoDigits(minute);
        const option = document.createElement("option");
        option.value = value;
        option.textContent = value;
        pickupMinuteSelect.appendChild(option);
      }
    }

    function timeStringToMinutes(timeValue) {
      if (typeof timeValue !== "string" || !timeValue.includes(":")) return NaN;
      const [hoursText, minutesText] = timeValue.split(":");
      const hours = Number(hoursText);
      const minutes = Number(minutesText);
      if (!Number.isInteger(hours) || !Number.isInteger(minutes)) return NaN;
      if (hours < 0 || hours > 23 || minutes < 0 || minutes > 59) return NaN;
      return hours * 60 + minutes;
    }

    function ensurePickupTimeDefault() {
      if (!pickupHourSelect || !pickupMinuteSelect) return;
      if (!pickupHourSelect.value || !pickupMinuteSelect.value) {
        const timeValue = getCurrentTimeValue();
        const [hour, minute] = timeValue.split(":");
        pickupHourSelect.value = hour;
        pickupMinuteSelect.value = minute;
      }
    }

    function getSelectedPickupTime() {
      ensurePickupTimeDefault();
      const hour = pickupHourSelect ? pickupHourSelect.value : "";
      const minute = pickupMinuteSelect ? pickupMinuteSelect.value : "";
      return hour && minute ? hour + ":" + minute : getCurrentTimeValue();
    }

    function isPickupReservationEnabled() {
      return !!(enablePickupTimeCheckbox && enablePickupTimeCheckbox.checked);
    }

    function syncPickupTimeVisibility() {
      if (!pickupTimeField) return;
      pickupTimeField.classList.toggle("is-hidden", !isPickupReservationEnabled());
    }

    function resetOrderMetaFields() {
      if (tableNumberInput) tableNumberInput.value = "";
      if (enablePickupTimeCheckbox) enablePickupTimeCheckbox.checked = false;
      const [hour, minute] = getCurrentTimeValue().split(":");
      if (pickupHourSelect) pickupHourSelect.value = hour;
      if (pickupMinuteSelect) pickupMinuteSelect.value = minute;
      syncPickupTimeVisibility();
    }

    function hidePrintReceiptLink() {
      pendingPassPrntUrl = "";
      if (printReceiptLink) printReceiptLink.setAttribute("href", "#");
      if (printReadyPanel) printReadyPanel.classList.remove("show");
    }

    function showPrintReceiptLink(passprntUrl) {
      pendingPassPrntUrl = passprntUrl;
      if (printReceiptLink) printReceiptLink.setAttribute("href", passprntUrl);
      if (printReadyPanel) printReadyPanel.classList.add("show");
    }

    function resolveCheckoutMeta() {
      const rawTable = tableNumberInput ? tableNumberInput.value.trim() : "";
      if (REQUIRE_TABLE_NUMBER && !rawTable) {
        alert("請先輸入桌號，才能確認結帳。");
        return null;
      }
      const tableNumber = rawTable || DEFAULT_TABLE_NUMBER;
      const isReservation = isPickupReservationEnabled();
      let pickupTime = "現場";
      if (isReservation) {
        pickupTime = getSelectedPickupTime();
        const pickupMinutes = timeStringToMinutes(pickupTime);
        const now = new Date();
        const nowMinutes = now.getHours() * 60 + now.getMinutes();
        if (!Number.isFinite(pickupMinutes) || pickupMinutes < nowMinutes) {
          alert("⚠️ 取餐時間不能早於現在時間喔！請重新確認。");
          return null;
        }
      }
      return { tableNumber, pickupTime, isReservation };
    }

    function renderMenu() {
      menuGrid.innerHTML = "";
      MENU_ITEMS.forEach((item) => {
        const button = document.createElement("button");
        button.className = "menu-item" + (item.discount ? " discount" : "");
        if (item.discount) {
          button.innerHTML = "<strong>" + item.name + "</strong>";
        } else {
          button.innerHTML =
            "<strong>" +
            item.name +
            "</strong>" +
            "<span>" +
            (item.price >= 0 ? "$" + item.price : "-$" + Math.abs(item.price)) +
            "</span>";
        }
        button.addEventListener("click", () => addToCart(item));
        menuGrid.appendChild(button);
      });
    }

    function addToCart(item) {
      cart.push({ id: item.id, name: item.name, price: item.price });
      hidePrintReceiptLink();
      renderCart();
    }

    function removeCartItem(index) {
      cart.splice(index, 1);
      hidePrintReceiptLink();
      renderCart();
    }

    function getCartTotal() {
      return cart.reduce((sum, item) => sum + item.price, 0);
    }

    function renderCart() {
      if (cart.length === 0) {
        cartList.innerHTML = '<div class="empty">尚未加入品項</div>';
      } else {
        cartList.innerHTML = "";
        cart.forEach((item, index) => {
          const row = document.createElement("div");
          row.className = "cart-item";
          row.innerHTML =
            '<div class="item-name">' +
            item.name +
            "</div>" +
            '<div class="item-price">' +
            (item.price >= 0 ? "$" + item.price : "-$" + Math.abs(item.price)) +
            "</div>" +
            '<button class="delete-btn" data-index="' +

            '">刪除(X)</button>';
          cartList.appendChild(row);
        });

      totalAmount.textContent = formatMoney(getCartTotal());
    }

    function clearOrder() {
      if (cart.length === 0) return;
      cart = [];
      hidePrintReceiptLink();
      renderCart();
    }

    function buildReceiptSummary(orderItems) {
      const map = {};
      orderItems.forEach((item) => {
        if (!map[item.id]) {
          map[item.id] = { name: item.name, qty: 0, unitPrice: item.price };
        }
        map[item.id].qty += 1;
      });
      return Object.values(map);
    }

    function fillReceipt(orderItems, orderNumber, checkoutTime, tableNumber, pickupTime) {
      if (receiptTableNumber) {
        receiptTableNumber.textContent = "桌號：" + (tableNumber || DEFAULT_TABLE_NUMBER);
      }
      if (receiptPickupTime) {
        receiptPickupTime.textContent = "預約取餐時間：" + (pickupTime || "即時");
      }
      if (receiptOrderNo) {
        receiptOrderNo.textContent = "訂單編號：" + formatOrderNumber(orderNumber);
      }
      receiptItems.innerHTML = "";

      const summary = buildReceiptSummary(orderItems);
      summary.forEach((line) => {
        const tr = document.createElement("tr");
        tr.innerHTML =
          "<td>" +
          line.name +
          "</td>" +
          "<td>" +
          line.qty +
          "</td>" +
          "<td>" +
          formatMoney(line.unitPrice) +
          "</td>";
        receiptItems.appendChild(tr);
      });

      const total = orderItems.reduce((sum, item) => sum + item.price, 0);
      receiptTotal.textContent = formatMoney(total);
    }

    function forceResetCheckoutState() {
      [reportModal, monthlyReportModal, monthlyRankingModal, historyModal, inventoryModal].forEach((modal) => {
        modal.classList.remove("show");
        modal.setAttribute("aria-hidden", "true");
      });
      syncModalLockState();
    }

    function syncModalLockState() {
      const hasOpenModal = [reportModal, monthlyReportModal, monthlyRankingModal, historyModal, inventoryModal].some(
        (modal) => modal && modal.classList.contains("show")
      );
      document.body.classList.toggle("modal-open", hasOpenModal);
      document.documentElement.classList.toggle("modal-open", hasOpenModal);
    }

    function prepareOrderForCheckout() {
      if (cart.length === 0) {
        return null;
      }
      const checkoutMeta = resolveCheckoutMeta();
      if (!checkoutMeta) return null;
      const snapshot = cart.map((item) => ({ id: item.id, name: item.name, price: item.price }));
      const checkoutTime = new Date();
      const orderNo = issueOrderNumber();
      fillReceipt(snapshot, orderNo, checkoutTime, checkoutMeta.tableNumber, checkoutMeta.pickupTime);
      return {
        snapshot,
        checkoutTime,
        orderNo,
        tableNumber: checkoutMeta.tableNumber,
        pickupTime: checkoutMeta.pickupTime,
        isReservation: checkoutMeta.isReservation
      };
    }

    async function saveOrder() {
      const preparedOrder = prepareOrderForCheckout();
      if (!preparedOrder) return null;
      await persistNewOrderToFirestore(
        preparedOrder.snapshot,
        preparedOrder.checkoutTime,
        preparedOrder.orderNo,
        preparedOrder.tableNumber,
        preparedOrder.pickupTime
      );
      return preparedOrder;
    }

    async function persistPreparedOrder(preparedOrder) {
      await persistNewOrderToFirestore(
        preparedOrder.snapshot,
        preparedOrder.checkoutTime,
        preparedOrder.orderNo,
        preparedOrder.tableNumber,
        preparedOrder.pickupTime
      );
    }
    function collectSalesRanking(summary) {
      return MENU_ITEMS.map((item) => ({
        id: item.id,
        name: item.name,
        qty: summary.itemCounts[item.id] || 0
      }))
        .filter((entry) => entry.qty > 0)
        .sort((a, b) => b.qty - a.qty);
    }

    function renderSalesRanking(listElement, ranking, emptyText) {
      listElement.innerHTML = "";
      if (ranking.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = emptyText;
        listElement.appendChild(empty);
        return;
      }

      const maxQty = ranking[0].qty;
      ranking.forEach((entry, index) => {
        const widthPercent = maxQty > 0 ? Math.max(8, (entry.qty / maxQty) * 100) : 0;
        const row = document.createElement("div");
        row.className = "sales-rank-row";
        row.innerHTML =
          '<div class="sales-rank-main">' +
          '<div class="sales-rank-top">' +
          '<span class="sales-rank-name">' +
          (index + 1) +
          ". " +
          entry.name +
          "</span>" +
          "<strong>" +
          entry.qty +
          " 份</strong>" +
          "</div>" +
          '<div class="sales-rank-bar"><div class="sales-rank-bar-fill" style="width:' +
          widthPercent +
          '%;"></div></div>' +
          "</div>" +
          '<div>' +
          entry.qty +
          " 份</div>";
        listElement.appendChild(row);
      });
    }

    async function collectTodaySalesAnalytics() {
      const today = getTodayKey();
      const orders = await fetchOrdersByDate(today);
      const todayOrders = orders.filter(
        (order) => order.date === today && order.status !== "voided" && order.is_daily_cleared !== true
      );
      const summary = createSummaryFromOrders(todayOrders);

      return {
        totalRevenue: summary.totalRevenue,
        itemCounts: summary.itemCounts
      };
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    async function voidOrderByIndex(filteredIndex) {
      let todayOrders;
      try {
        todayOrders = await getTodayOrdersSorted();
      } catch (error) {
        console.error(error);
        alert("載入訂單失敗：" + (error && error.message ? error.message : String(error)));
        return;
      }

      const target = todayOrders[filteredIndex];
      if (!target || target.status === "voided" || !target.id) return;

      const orderNoText = formatOrderNumber(target.orderNo || 0);
      const confirmed = confirm(
        "確定要將 " +
          orderNoText +
          " 作廢嗎？作廢後將從報表中扣除此筆金額與數量。"
      );
      if (!confirmed) return;

      try {
        await updateDoc(doc(db, ORDERS_COLLECTION, target.id), { status: "voided" });
      } catch (error) {
        console.error(error);
        alert("作廢失敗：" + (error && error.message ? error.message : String(error)));
        return;
      }
      expandedHistoryOrderId = null;
      await renderHistoryList(historyTab);
      alert("訂單 " + orderNoText + " 已作廢。");
    }

    async function removeOneItemFromOrder(filteredIndex, itemId, itemName) {
      let todayOrders;
      try {
        todayOrders = await getTodayOrdersSorted();
      } catch (error) {
        console.error(error);
        alert("載入訂單失敗：" + (error && error.message ? error.message : String(error)));
        return;
      }

      const target = todayOrders[filteredIndex];
      if (!target || target.status === "voided" || !target.id) return;

      const currentQty = target.itemCounts[itemId] || 0;
      if (currentQty <= 0) return;

      const confirmed = confirm("確定要從此訂單中退除 1 份 " + itemName + " 嗎？");
      if (!confirmed) return;

      const nextCounts = { ...target.itemCounts };
      nextCounts[itemId] = Math.max(0, (nextCounts[itemId] || 0) - 1);

      const nextLineItems = Array.isArray(target.lineItems) ? target.lineItems.slice() : [];
      if (nextLineItems.length > 0) {
        const removeAt = nextLineItems.findIndex((line) => line && line.id === itemId);
        if (removeAt >= 0) nextLineItems.splice(removeAt, 1);
      }

      let recalculatedTotal = 0;
      MENU_ITEMS.forEach((menuItem) => {
        const qty = nextCounts[menuItem.id] || 0;
        recalculatedTotal += menuItem.price * qty;
      });

      const remainingCount = MENU_ITEMS.reduce((sum, menuItem) => sum + (nextCounts[menuItem.id] || 0), 0);
      const nextStatus = remainingCount <= 0 || recalculatedTotal === 0 ? "voided" : target.status;

      try {
        await updateDoc(doc(db, ORDERS_COLLECTION, target.id), {
          itemCounts: nextCounts,
          lineItems: nextLineItems,
          total: recalculatedTotal,
          status: nextStatus
        });
      } catch (error) {
        console.error(error);
        alert("更新失敗：" + (error && error.message ? error.message : String(error)));
        return;
      }

      expandedHistoryOrderId = nextStatus === "voided" ? null : target.id;
      await renderHistoryList(historyTab);
      alert("已退除 1 份「" + itemName + "」。");
    }

    async function resetDailyReport() {
      const confirmed = confirm("確定要清空「今天」的所有帳目嗎？這不會影響之前的月報表歷史紀錄。");
      if (!confirmed) return;

      const today = getTodayKey();
      let orders;
      try {
        orders = await fetchOrdersByDate(today);
      } catch (error) {
        console.error(error);
        alert("載入訂單失敗：" + (error && error.message ? error.message : String(error)));
        return;
      }

      const targets = orders.filter((order) => order.date === today);
      const chunkSize = 400;
      try {
        for (let i = 0; i < targets.length; i += chunkSize) {
          const batch = writeBatch(db);
          targets.slice(i, i + chunkSize).forEach((order) => {
            if (order.id) {
              batch.update(doc(db, ORDERS_COLLECTION, order.id), { is_daily_cleared: true });
            }
          });
          await batch.commit();
        }
      } catch (error) {
        console.error(error);
        alert("重置失敗：" + (error && error.message ? error.message : String(error)));
        return;
      }

      resetTodayOrderCounter();
      await openReportModal();
      alert("今日營收紀錄與取餐號碼已重置。");
    }

    function exportSystemData() {
      const snapshot = {};
      for (let i = 0; i < localStorage.length; i += 1) {
        const key = localStorage.key(i);
        if (!key) continue;
        snapshot[key] = localStorage.getItem(key);
      }

      const payload = {
        exportedAt: new Date().toISOString(),
        data: snapshot
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const day = getTodayKey();
      a.href = url;
      a.download = "mypos-backup-" + day + ".json";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      alert("系統資料已匯出。");
    }

    function applyImportedData(rawText) {
      let parsed;
      try {
        parsed = JSON.parse(rawText);
      } catch (error) {
        alert("匯入失敗：檔案不是有效的 JSON。");
        return;
      }

      const incoming = parsed && typeof parsed === "object" && parsed.data && typeof parsed.data === "object"
        ? parsed.data
        : parsed;
      if (!incoming || typeof incoming !== "object" || Array.isArray(incoming)) {
        alert("匯入失敗：資料格式不正確。");
        return;
      }

      const confirmed = confirm("匯入會覆蓋目前系統資料，確定要繼續嗎？");
      if (!confirmed) return;

      localStorage.clear();
      Object.keys(incoming).forEach((key) => {
        const value = incoming[key];
        if (typeof value === "string") {
          localStorage.setItem(key, value);
        } else {
          localStorage.setItem(key, JSON.stringify(value));
        }
      });

      alert("匯入成功，將重新整理頁面。");
      window.location.reload();
    }

    }

        if (!(target instanceof HTMLInputElement) || !target.files || target.files.length === 0) return;
        const file = target.files[0];
        const reader = new FileReader();
        reader.onload = () => {
          if (typeof reader.result === "string") {
            applyImportedData(reader.result);
          } else {
            alert("匯入失敗：無法讀取檔案內容。");
          }
          target.value = "";
        };
        reader.onerror = () => {

          if (!Number.isFinite(idx)) return;
          const detail = document.getElementById("historyDetail-" + idx);
          if (detail) {
            const orderId = target.dataset.orderId || detail.dataset.orderId || "";
            const shouldShow = !detail.classList.contains("show");
            detail.classList.toggle("show", shouldShow);
            expandedHistoryOrderId = shouldShow && orderId ? orderId : null;
          }
        }

        if (target.classList.contains("history-void-btn")) {
          const idx = Number(target.dataset.index);
          if (Number.isFinite(idx)) {
            voidOrderByIndex(idx).catch((error) => {
              console.error(error);
              alert("作廢失敗：" + (error && error.message ? error.message : String(error)));

          }
        }

        if (target.classList.contains("history-remove-item-btn")) {
          const idx = Number(target.dataset.index);
          const itemId = target.dataset.itemId;
          const itemName = target.dataset.itemName || "品項";
          if (Number.isFinite(idx) && itemId) {
            removeOneItemFromOrder(idx, itemId, itemName).catch((error) => {
              console.error(error);
              alert("更新失敗：" + (error && error.message ? error.message : String(error)));
            });
          }
        }

      reportModal.addEventListener("click", (event) => {
        if (event.target === reportModal) closeReportModal();
      });

      monthlyReportModal.addEventListener("click", (event) => {
        if (event.target === monthlyReportModal) closeMonthlyReportModal();
      });

      monthlyRankingModal.addEventListener("click", (event) => {
        if (event.target === monthlyRankingModal) closeMonthlyRankingModal();
      });

      historyModal.addEventListener("click", (event) => {
        if (event.target === historyModal) closeHistoryModal();
      });

      inventoryModal.addEventListener("click", (event) => {
        if (event.target === inventoryModal) closeInventoryModal();
      });

      inventoryList.addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const itemId = target.dataset.id;
        if (!itemId) return;
        if (target.dataset.action === "plus") adjustInventoryStock(itemId, true);
        if (target.dataset.action === "minus") adjustInventoryStock(itemId, false);
      });

    }

    function bootstrapPosApplication() {
      bindStaticUiEventsOnce();
      buildPickupTimeSelectOptions();
      renderMenu();
      renderCart();
      resetOrderMetaFields();
    }

    const SAVED_EMAIL_KEY = "savedEmail";

    const loginOverlayEl = document.getElementById("loginOverlay");
    const posWorkspaceEl = document.getElementById("posWorkspace");
    const loginErrorTextEl = document.getElementById("loginErrorText");
    const loginEmailEl = document.getElementById("loginEmail");
    const loginPasswordEl = document.getElementById("loginPassword");
    const loginBtnEl = document.getElementById("loginBtn");
    const rememberEmailCheckboxEl = document.getElementById("rememberEmailCheckbox");

    function setLoginError(message) {
      if (loginErrorTextEl) {
        loginErrorTextEl.textContent = message ? String(message) : "";
      }
    }

    function syncLoginFormFromSavedEmail() {
      try {
        const saved = localStorage.getItem(SAVED_EMAIL_KEY);
        if (saved && typeof saved === "string" && saved.trim()) {
          if (loginEmailEl) loginEmailEl.value = saved.trim();
          if (rememberEmailCheckboxEl) rememberEmailCheckboxEl.checked = true;
        } else {
          if (loginEmailEl) loginEmailEl.value = "";
          if (rememberEmailCheckboxEl) rememberEmailCheckboxEl.checked = false;
        }
      } catch (error) {
        if (loginEmailEl) loginEmailEl.value = "";
        if (rememberEmailCheckboxEl) rememberEmailCheckboxEl.checked = false;
      }
    }

    function performLogin() {
      const email = loginEmailEl ? loginEmailEl.value.trim() : "";
      const password = loginPasswordEl ? loginPasswordEl.value : "";
      setLoginError("");
      if (!email) {
        setLoginError("請輸入 Email。");
        return Promise.resolve();
      }
      return signInWithEmailAndPassword(auth, email, password)
        .then(() => {
          if (loginPasswordEl) loginPasswordEl.value = "";
          try {
            if (rememberEmailCheckboxEl && rememberEmailCheckboxEl.checked) {
              localStorage.setItem(SAVED_EMAIL_KEY, email);
            } else {
              localStorage.removeItem(SAVED_EMAIL_KEY);
            }
          } catch (storageError) {
            console.warn(storageError);
          }
        })
        .catch((error) => {
          setLoginError(error.message || String(error));
        });
    }

    if (loginBtnEl) {
      loginBtnEl.addEventListener("click", () => {
        void performLogin();
      });
    }

    if (loginPasswordEl) {
      loginPasswordEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          void performLogin();
        }
      });
    }

    syncLoginFormFromSavedEmail();

    onAuthStateChanged(auth, (user) => {
      if (!loginOverlayEl || !posWorkspaceEl) return;
      if (user) {
        setLoginError("");
        loginOverlayEl.classList.add("is-hidden");
        posWorkspaceEl.hidden = false;
      } else {
        posWorkspaceEl.hidden = true;
        loginOverlayEl.classList.remove("is-hidden");
        if (loginPasswordEl) loginPasswordEl.value = "";
        syncLoginFormFromSavedEmail();
      }
    });

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", bootstrapPosApplication, { once: true });
    } else {
      bootstrapPosApplication();
    }
  </script>
</body>
</html>
